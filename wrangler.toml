name = "swu-singles-nz"
main = "src/worker/index.ts"
compatibility_date = "2026-06-13"

[[d1_databases]]
binding = "DB"
database_name = "swu-singles-nz"
database_id = "39a9b2a4-365e-4d5c-89ac-84b1d8e2f2bb"

[[queues.producers]]
binding = "SELLER_SYNC_QUEUE"
queue = "swu-seller-sync"

[[queues.consumers]]
queue = "swu-seller-sync"
max_batch_size = 1
max_retries = 2
retry_delay = 300
max_concurrency = 1

[[ratelimits]]
name = "READ_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 120
period = 60

[[ratelimits]]
name = "IMAGE_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 360
period = 60

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 14 * * *"] # daily at 14:00 UTC (02:00 NZST / 03:00 NZDT)
